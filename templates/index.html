<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Artemis</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #0b0f1a;
            color: white;
            margin: 0;
            text-align: center;
        }

        header{
            background-color: #111827;
            padding: 20px;
        }

        h1{
            color: #00bfff;
        }

        .container{
            width: 90%;
            margin: auto;
        }

        .logo{
            width: 220px;
            margin-top: 20px;
        }

        .texto{
            font-size: 18px;
            line-height: 1.6;
            margin: 30px auto;
            max-width: 900px;
        }

        .galeria{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .galeria img{
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        footer{
            background-color: #111827;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Missão Artemis</h1>
    </header>

    <div class="container">

        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Artemis_program_logo.svg/800px-Artemis_program_logo.svg.png">

        <div class="texto">
            <p>
                A Missão Artemis é um programa espacial liderado pela NASA que busca levar novamente astronautas à Lua.
                O projeto também pretende desenvolver tecnologias para futuras missões tripuladas a Marte.
            </p>
        </div>

        <h2>Galeria de Fotos</h2>

        <div class="galeria">
            <img src="https://images-assets.nasa.gov/image/KSC-20221116-PH-KLS01_0032/KSC-20221116-PH-KLS01_0032~large.jpg">
            <img src="https://images-assets.nasa.gov/image/KSC-20221116-PH-KLS01_0050/KSC-20221116-PH-KLS01_0050~large.jpg">
            <img src="https://images-assets.nasa.gov/image/KSC-20221116-PH-KLS01_0118/KSC-20221116-PH-KLS01_0118~large.jpg">
            <img src="https://images-assets.nasa.gov/image/KSC-20221116-PH-KLS01_0172/KSC-20221116-PH-KLS01_0172~large.jpg">
            <img src="https://images-assets.nasa.gov/image/Artemis-I-on-pad-at-sunrise/Artemis-I-on-pad-at-sunrise~large.jpg">
        </div>

    </div>

    <footer>
        Projeto desenvolvido com Flask
    </footer>

</body>
</html>
